name: oma-validate

# Copy this file into your project at .github/workflows/oma-validate.yml.
# Validates .omao/profile.yaml and .omao/ontology/ artifacts on every PR.

on:
  pull_request:
    paths:
      - '.omao/**'
      - '.github/workflows/oma-validate.yml'
  push:
    branches: [main]
    paths:
      - '.omao/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: python -m pip install --upgrade pip jsonschema pyyaml
      - name: Download OMA schemas
        run: |
          curl -fsSL -o /tmp/oma-schemas.tar.gz \
            https://github.com/aws-samples/sample-oh-my-aidlcops/archive/refs/tags/v0.2.0-preview.1.tar.gz
          mkdir -p /tmp/oma
          tar xzf /tmp/oma-schemas.tar.gz -C /tmp/oma --strip-components=1
      - name: Validate profile
        run: |
          python3 - <<'PY'
          import json, sys, yaml
          from jsonschema import Draft7Validator
          schema = json.load(open('/tmp/oma/schemas/profile/profile.schema.json'))
          doc = yaml.safe_load(open('.omao/profile.yaml'))
          errors = list(Draft7Validator(schema).iter_errors(doc))
          for e in errors:
              print(f"[profile] {list(e.absolute_path)}: {e.message}", file=sys.stderr)
          sys.exit(1 if errors else 0)
          PY
