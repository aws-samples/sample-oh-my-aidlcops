# OMA Harness DSL for the agenticops plugin (v0.5 DSL v2 migration).
#
# agenticops covers the AIDLC Operations phase: self-improving loops,
# autonomous deploy, continuous evaluation, incident response, and cost
# governance. The plugin ships no MCP servers of its own — it reuses the
# agentic-platform MCP catalogue and the hosted awslabs MCP runtime layer.
#
# This file exists so that oma-compile has a v2 manifest to validate and
# so that `oma doctor --enterprise` (v0.5) does not warn about a missing
# .oma.yaml. Skills remain authored as SKILL.md files under skills/.

version: 2
plugin: agenticops

metadata:
  labels:
    aidlc-phase: operations
    tier-0-surface: "true"

# No MCP servers or agents declared at this layer — see
# plugins/agentic-platform/agentic-platform.oma.yaml for the shared MCP
# catalogue that agenticops skills invoke through Claude Code's merged
# .mcp.json or through Kiro's resource:// graph.
mcp: {}
agents: []

# Keyword triggers for Tier-0 routing.
triggers:
  - id: agenticops-mode
    keywords: ["agenticops", "ops-mode"]
    context_required: []
    command: /oma:agenticops
    description: "Activate AgenticOps operations mode (continuous-eval + incident-response + cost-governance)."
  - id: self-improving
    keywords: ["self-improving", "feedback-loop"]
    context_required: []
    command: /oma:self-improving
    description: "Run the Langfuse-backed self-improving feedback loop to produce prompt/skill improvement PRs."
