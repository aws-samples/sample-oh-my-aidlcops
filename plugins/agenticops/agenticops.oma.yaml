# OMA Harness DSL for the agenticops plugin (v0.5 DSL v2 migration).
#
# agenticops covers the AIDLC Operations phase: self-improving loops,
# autonomous deploy, continuous evaluation, incident response, and cost
# governance. The plugin ships no MCP servers of its own — it reuses the
# ai-infra MCP catalogue and the hosted awslabs MCP runtime layer.
#
# This file exists so that oma-compile has a v2 manifest to validate and
# so that `oma doctor --enterprise` (v0.5) does not warn about a missing
# .oma.yaml. Skills remain authored as SKILL.md files under skills/.

version: 2
plugin: agenticops

metadata:
  labels:
    aidlc-phase: operations
    tier-0-surface: "true"

# No MCP servers or agents declared at this layer — see
# plugins/ai-infra/ai-infra.oma.yaml for the shared MCP
# catalogue that agenticops skills invoke through Claude Code's merged
# .mcp.json or through Kiro's resource:// graph.
mcp: {}
agents: []

# ---------------------------------------------------------------------------
# Workflows (v2) — DAG-based execution plans validated at compile time.
# ---------------------------------------------------------------------------
workflows:
  incident-pipeline:
    description: "Autonomous incident detection → triage → diagnosis → remediation → verification loop."
    steps:
      - id: detect
        skill_ref: anomaly-detection
        on_failure: continue
      - id: triage
        skill_ref: incident-response
        depends_on: [detect]
      - id: diagnose
        skill_ref: root-cause-analysis
        depends_on: [triage]
      - id: remediate
        skill_ref: automated-remediation
        depends_on: [diagnose]
        on_failure: rollback
      - id: verify
        skill_ref: continuous-eval
        depends_on: [remediate]
        on_failure: continue

# ---------------------------------------------------------------------------
# Policies (v2) — shared secret-protection baseline (#59).
# These three rules are the cross-cutting secret-file guardrails, identical to
# the ones in ai-infra. They are duplicated into every plugin that ships so that
# secret protection does NOT depend on ai-infra being installed — an agenticops-
# only install (autonomous deploys / cost governance) still blocks secret writes.
# The compiler emits hooks/{enforce.py,harness-rules.json,hooks.json} from this
# block; do not hand-edit those. Infra-scoped rules (kubectl, EKS MCP) stay
# ai-infra-only.
# ---------------------------------------------------------------------------
policies:
  - id: deny-secret-file-write
    severity: blocking
    phase: [construction, operations]
    description: "Block Write to secret-bearing files (.env, secrets/, *.pem, kubeconfig)."
    enforce:
      tool: Write
      deny_if:
        file_path_matches: "(^|/)\\.env(\\.|$)|(^|/)secrets?/|\\.pem$|(^|/)kubeconfig$"
      decision: deny
      reason: "Harness: writing secret-bearing files is blocked. Use a secrets manager (e.g. External Secrets, SSM) instead of committing secrets."
  - id: deny-secret-file-edit
    severity: blocking
    phase: [construction, operations]
    description: "Block Edit to secret-bearing files (closes the Write-only bypass)."
    enforce:
      tool: Edit
      deny_if:
        file_path_matches: "(^|/)\\.env(\\.|$)|(^|/)secrets?/|\\.pem$|(^|/)kubeconfig$"
      decision: deny
      reason: "Harness: editing secret-bearing files is blocked. Use a secrets manager (e.g. External Secrets, SSM) instead of committing secrets."
  - id: deny-secret-file-shell-redirect
    severity: blocking
    phase: [construction, operations]
    description: "Block shell redirection / tee into secret-bearing files (closes the Bash bypass)."
    enforce:
      tool: Bash
      deny_if:
        command_matches: "(>>?|tee\\b|dd\\b|cp\\b|mv\\b)[^|;&]*(\\.env(\\.|\\b)|secrets?/|\\.pem\\b|kubeconfig\\b)"
      decision: deny
      reason: "Harness: writing secret-bearing files via the shell is blocked. Use a secrets manager (e.g. External Secrets, SSM) instead of committing secrets."

# ---------------------------------------------------------------------------
# Keyword triggers for Tier-0 routing.
# ---------------------------------------------------------------------------
triggers:
  - id: agenticops-mode
    keywords: ["agenticops", "ops-mode"]
    context_required: []
    command: /oma:agenticops
    description: "Activate AgenticOps operations mode (continuous-eval + incident-response + cost-governance)."
  - id: self-improving
    keywords: ["self-improving", "feedback-loop"]
    context_required: []
    command: /oma:self-improving
    description: "Run the Langfuse-backed self-improving feedback loop to produce prompt/skill improvement PRs."
  - id: incident-pipeline
    keywords: ["incident-pipeline", "incident-response-pipeline"]
    context_required: []
    command: /oma:incident-pipeline
    description: "Run the full incident pipeline: detect → triage → diagnose → remediate → verify."
