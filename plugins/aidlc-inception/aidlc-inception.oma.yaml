# OMA Harness DSL for the aidlc-inception plugin (v0.5 DSL v2 migration).
#
# aidlc-inception contributes opt-in extensions to awslabs/aidlc-workflows
# for AIDLC Phase 1: workspace detection, requirements analysis, user
# stories, and workflow planning. The plugin ships only skills and
# extension rules — no MCP servers or agent profiles.

version: 2
plugin: aidlc-inception

metadata:
  labels:
    aidlc-phase: inception

mcp: {}
agents: []

triggers:
  - id: inception
    keywords: ["inception"]
    context_required: []
    command: /oma:inception
    description: "Run AIDLC Phase 1 only (workspace detection, requirements, user stories, workflow plan)."
