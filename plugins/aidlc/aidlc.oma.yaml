# OMA Harness DSL for the aidlc plugin.
#
# aidlc bundles AIDLC Phase 1 (Inception) and Phase 2 (Construction)
# into a single marketplace entry. Skills live under two sub-folders
# that mirror the phase boundary:
#
#   plugins/aidlc/skills/inception/     (workspace detection, intake,
#                                         requirements, user stories,
#                                         workflow planning)
#   plugins/aidlc/skills/construction/  (component design, codegen,
#                                         test strategy, risk discovery,
#                                         quality gates)
#
# Contributes only skills and opt-in extensions for
# awslabs/aidlc-workflows; ships no MCP servers or Kiro agent profiles
# (phase orchestration happens through the /oma:* slash commands).

version: 2
plugin: aidlc

metadata:
  labels:
    aidlc-phase: inception,construction

mcp: {}
agents: []

# ---------------------------------------------------------------------------
# Policies (v2) — shared secret-protection baseline (#59).
# These three rules are the cross-cutting secret-file guardrails, identical to
# the ones in ai-infra. They are duplicated into every plugin that ships so that
# secret protection does NOT depend on ai-infra being installed — an aidlc-only
# install still blocks secret writes during Inception/Construction. The compiler
# emits hooks/{enforce.py,harness-rules.json,hooks.json} from this block; do not
# hand-edit those. Infra-scoped rules (kubectl, EKS MCP) stay ai-infra-only.
# ---------------------------------------------------------------------------
policies:
  - id: deny-secret-file-write
    severity: blocking
    phase: [construction, operations]
    description: "Block Write to secret-bearing files (.env, secrets/, *.pem, kubeconfig)."
    enforce:
      tool: Write
      deny_if:
        file_path_matches: "(^|/)\\.env(\\.|$)|(^|/)secrets?/|\\.pem$|(^|/)kubeconfig$"
      decision: deny
      reason: "Harness: writing secret-bearing files is blocked. Use a secrets manager (e.g. External Secrets, SSM) instead of committing secrets."
  - id: deny-secret-file-edit
    severity: blocking
    phase: [construction, operations]
    description: "Block Edit to secret-bearing files (closes the Write-only bypass)."
    enforce:
      tool: Edit
      deny_if:
        file_path_matches: "(^|/)\\.env(\\.|$)|(^|/)secrets?/|\\.pem$|(^|/)kubeconfig$"
      decision: deny
      reason: "Harness: editing secret-bearing files is blocked. Use a secrets manager (e.g. External Secrets, SSM) instead of committing secrets."
  - id: deny-secret-file-shell-redirect
    severity: blocking
    phase: [construction, operations]
    description: "Block shell redirection / tee into secret-bearing files (closes the Bash bypass)."
    enforce:
      tool: Bash
      deny_if:
        command_matches: "(>>?|tee\\b|dd\\b|cp\\b|mv\\b)[^|;&]*(\\.env(\\.|\\b)|secrets?/|\\.pem\\b|kubeconfig\\b)"
      decision: deny
      reason: "Harness: writing secret-bearing files via the shell is blocked. Use a secrets manager (e.g. External Secrets, SSM) instead of committing secrets."

triggers:
  - id: inception
    keywords: ["inception"]
    context_required: []
    command: /oma:inception
    description: "Run AIDLC Phase 1 only (workspace detection, requirements, user stories, workflow plan)."
  - id: construction
    keywords: ["construction"]
    context_required: []
    command: /oma:construction
    description: "Run AIDLC Phase 2 only (component design, codegen, agentic TDD)."
  - id: aidlc-loop
    keywords: ["aidlc"]
    context_required: ["feature", "story", "ticket"]
    command: /oma:aidlc-loop
    description: "Run a single-feature AIDLC Inception->Construction pass."
